services:
  claption:
    build: .
    ports:
      - "3000:3000"
    environment:
      FIREWORKS_API_KEY: ${FIREWORKS_API_KEY}
      FIREWORKS_BASE_URL: ${FIREWORKS_BASE_URL:-https://api.fireworks.ai/inference/v1}
      FIREWORKS_VISION_MODEL: ${FIREWORKS_VISION_MODEL:-accounts/fireworks/models/qwen3p7-plus}
      FIREWORKS_TEXT_MODEL: ${FIREWORKS_TEXT_MODEL:-accounts/fireworks/models/qwen3p7-plus}
      FIREWORKS_JUDGE_MODEL: ${FIREWORKS_JUDGE_MODEL:-accounts/fireworks/models/kimi-k2p7-code}
      CLAPTION_MAX_FRAMES: ${CLAPTION_MAX_FRAMES:-24}
      CLAPTION_REPAIR_THRESHOLD: ${CLAPTION_REPAIR_THRESHOLD:-8.0}
    volumes:
      - ./videos:/videos:ro
      - ./runs:/runs
